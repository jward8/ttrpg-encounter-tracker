appId: com.ttrpg.encounter-tracker
productName: TTRPG Encounter Tracker

directories:
  output: release

files:
  - out/**/*

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64

publish:
  provider: github
  releaseType: release
